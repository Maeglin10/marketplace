name: Service Marketplace
services:
  web:
    builds:
      - path: .
        dockerfile: Dockerfile
    start: npm start
    envs:
      - key: DATABASE_URL
        description: PostgreSQL connection string (provided by Railway Postgres plugin)
      - key: JWT_SECRET
        description: JWT signing secret — min 32 chars, generate with openssl rand -base64 32
      - key: STRIPE_SECRET_KEY
        description: Stripe secret API key (sk_live_... or sk_test_...)
      - key: STRIPE_WEBHOOK_SECRET
        description: Stripe webhook signing secret (whsec_...) — from Stripe Dashboard > Webhooks
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        description: Stripe publishable key (pk_live_... or pk_test_...) — used at build time
      - key: NEXT_PUBLIC_APP_URL
        description: Public URL of the app on Railway (e.g. https://your-app.railway.app)
      - key: UPLOADTHING_TOKEN
        description: UploadThing token — create app at uploadthing.com > API Keys
      - key: RESEND_API_KEY
        description: Resend API key — create at resend.com > API Keys
      - key: EMAIL_FROM
        description: "Sender address with verified domain, e.g. Marketplace <noreply@yourdomain.com>"
      - key: UPSTASH_REDIS_REST_URL
        description: (optional) Upstash Redis URL for distributed rate limiting
      - key: UPSTASH_REDIS_REST_TOKEN
        description: (optional) Upstash Redis token

  postgres:
    image: postgres:15-alpine
    envs:
      - key: POSTGRES_DB
        value: marketplace
      - key: POSTGRES_USER
        value: marketplace
      - key: POSTGRES_PASSWORD
        description: Postgres password (auto-generated by Railway)
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: {}
