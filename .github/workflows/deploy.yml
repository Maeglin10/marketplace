name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # NOTE: Set `if: true` and configure the secrets below to activate deployment.
    # Required secrets in GitHub repository settings:
    #   - VERCEL_TOKEN        → Vercel account token (vercel.com/account/tokens)
    #   - VERCEL_ORG_ID      → Found in vercel.com/[team]/settings
    #   - VERCEL_PROJECT_ID  → Found in vercel.com/[team]/[project]/settings
    #   OR for Railway:
    #   - RAILWAY_TOKEN      → railway.app → Account Settings → Tokens
    if: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Option A: Deploy to Vercel ──────────────────────────────────────────
      # Uncomment the block below and remove Option B to use Vercel.
      # Required secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
      #
      # - name: Install Vercel CLI
      #   run: npm install -g vercel
      #
      # - name: Pull Vercel environment
      #   run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      #   env:
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      #
      # - name: Build for Vercel
      #   run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      #   env:
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      #
      # - name: Deploy to Vercel
      #   run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      #   env:
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Option B: Deploy to Railway ─────────────────────────────────────────
      # Uncomment the block below and remove Option A to use Railway.
      # Required secrets: RAILWAY_TOKEN
      #
      # - name: Install Railway CLI
      #   run: npm install -g @railway/cli
      #
      # - name: Deploy to Railway
      #   run: railway up --detach
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deployment placeholder
        run: echo "Configure Option A (Vercel) or Option B (Railway) above, then set if:true"
