version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: marketplace-db
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: dev-password
    ports:
      - "5432:5432"
    volumes:
      - marketplace_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace-app
    # ── Production environment variables ──────────────────────────────────────
    # Copy .env.example to .env and fill in real values, or pass them here.
    # Never commit secrets to this file; use Docker secrets or a .env file.
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://marketplace:dev-password@postgres:5432/marketplace
      # JWT_SECRET: <strong-random-secret-min-32-chars>
      # STRIPE_SECRET_KEY: sk_live_...
      # STRIPE_WEBHOOK_SECRET: whsec_...
      # NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_live_...
      # UPLOADTHING_TOKEN: <your-uploadthing-token>
      # RESEND_API_KEY: re_...
      # EMAIL_FROM: "Marketplace <noreply@yourdomain.com>"
      # NEXT_PUBLIC_APP_URL: https://yourdomain.com
      # NEXT_PUBLIC_APP_NAME: ServiceHub
      # SENTRY_DSN: https://...@sentry.io/...
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: marketplace-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Provide your own nginx.conf and SSL certificates in production.
      # Minimal reverse proxy config to forward traffic to the app service.
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    # NOTE: nginx.conf is optional for local development.
    # For production, create nginx.conf pointing upstream to http://app:3000
    profiles:
      - production

volumes:
  marketplace_db_data:
